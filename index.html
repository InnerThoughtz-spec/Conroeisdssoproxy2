<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SCRMJT — Proxy</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#08090d;--surface:#0e1016;--border:#1c2030;--line:#232840;
    --accent:#3ef0c8;--accent2:#7b5df5;--danger:#f05a3e;
    --text:#d8e0f0;--muted:#5a6080;
    --mono:'Share Tech Mono',monospace;--display:'Bebas Neue',sans-serif;--body:'DM Sans',sans-serif;
  }
  html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--body);font-size:15px;line-height:1.6;overflow-x:hidden}
  body::before{content:'';pointer-events:none;position:fixed;inset:0;z-index:999;
    background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
    opacity:.025;mix-blend-mode:overlay}
  body::after{content:'';pointer-events:none;position:fixed;inset:0;z-index:998;
    background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.18) 2px,rgba(0,0,0,.18) 4px)}

  .shell{min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:0 1.25rem 3rem}
  header{width:100%;max-width:900px;padding:1.6rem 0 1rem;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
  .logo{font-family:var(--display);font-size:2.4rem;letter-spacing:.12em;background:linear-gradient(90deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1}
  .logo span{font-size:.85rem;font-family:var(--mono);-webkit-text-fill-color:var(--muted);letter-spacing:.05em}
  .status-pill{display:flex;align-items:center;gap:.45rem;font-family:var(--mono);font-size:.72rem;color:var(--muted);border:1px solid var(--border);border-radius:99px;padding:.28rem .8rem}
  .status-dot{width:7px;height:7px;border-radius:50%;background:var(--muted);transition:background .4s}
  .status-dot.online{background:var(--accent);box-shadow:0 0 8px var(--accent);animation:pulse 2s infinite}
  .status-dot.error{background:var(--danger)}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

  .card{width:100%;max-width:900px;margin-top:2.4rem;background:var(--surface);border:1px solid var(--border);border-radius:6px;overflow:hidden}
  .url-row{display:flex;align-items:stretch;border-bottom:1px solid var(--border)}
  .url-prefix{font-family:var(--mono);font-size:.8rem;color:var(--muted);padding:0 1rem;display:flex;align-items:center;border-right:1px solid var(--border);background:var(--bg);white-space:nowrap;user-select:none}
  #urlInput{flex:1;background:transparent;border:none;outline:none;color:var(--text);font-family:var(--mono);font-size:.92rem;padding:.9rem 1rem;caret-color:var(--accent)}
  #urlInput::placeholder{color:var(--muted)}
  .go-btn{background:linear-gradient(135deg,var(--accent2),var(--accent));border:none;cursor:pointer;padding:0 1.4rem;font-family:var(--display);font-size:1.05rem;letter-spacing:.1em;color:var(--bg);transition:opacity .2s,transform .1s;clip-path:polygon(8px 0%,100% 0%,100% 100%,0% 100%)}
  .go-btn:hover{opacity:.88}.go-btn:active{transform:scale(.97)}

  .toolbar{display:flex;gap:.5rem;padding:.65rem 1rem;border-bottom:1px solid var(--border);background:var(--bg);flex-wrap:wrap}
  .tb-btn{background:none;border:1px solid var(--border);color:var(--muted);font-family:var(--mono);font-size:.72rem;padding:.3rem .75rem;border-radius:3px;cursor:pointer;transition:all .15s}
  .tb-btn:hover{border-color:var(--accent);color:var(--accent)}
  .tb-btn.active{border-color:var(--accent2);color:var(--accent2);background:rgba(123,93,245,.1)}

  #proxyFrame{width:100%;height:600px;border:none;background:#fff;display:none}
  #splash{padding:4rem 2rem;text-align:center;display:flex;flex-direction:column;align-items:center;gap:1.2rem}
  .splash-glyph{font-family:var(--display);font-size:6rem;line-height:1;background:linear-gradient(180deg,var(--accent2) 0%,transparent 130%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;opacity:.35}
  .splash-title{font-family:var(--display);font-size:1.8rem;letter-spacing:.15em;color:var(--text)}
  .splash-sub{color:var(--muted);font-size:.88rem;max-width:420px}
  .quick-links{display:flex;flex-wrap:wrap;gap:.6rem;justify-content:center;margin-top:.5rem}
  .ql{font-family:var(--mono);font-size:.74rem;color:var(--muted);border:1px solid var(--border);padding:.3rem .7rem;border-radius:3px;cursor:pointer;transition:all .15s;background:none}
  .ql:hover{border-color:var(--accent);color:var(--accent)}

  .log-section{max-width:900px;width:100%;margin-top:1.4rem}
  .log-header{font-family:var(--mono);font-size:.72rem;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;padding:.5rem 0 .4rem;border-bottom:1px solid var(--border);display:flex;justify-content:space-between}
  #logList{list-style:none;max-height:140px;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
  #logList li{font-family:var(--mono);font-size:.72rem;color:var(--muted);padding:.3rem 0;border-bottom:1px solid var(--border);display:flex;gap:.8rem}
  #logList li .ts{color:var(--accent2);flex-shrink:0}
  #logList li .lvl-ok{color:var(--accent)}
  #logList li .lvl-err{color:var(--danger)}

  #swBanner{width:100%;max-width:900px;margin-top:1rem;font-family:var(--mono);font-size:.76rem;padding:.55rem 1rem;border-radius:4px;border:1px solid var(--border);display:none}
  #swBanner.ok{border-color:var(--accent);color:var(--accent);background:rgba(62,240,200,.06)}
  #swBanner.err{border-color:var(--danger);color:var(--danger);background:rgba(240,90,62,.06)}

  footer{max-width:900px;width:100%;margin-top:2.5rem;padding-top:1rem;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;font-family:var(--mono);font-size:.68rem;color:var(--muted)}
</style>
</head>
<body>
<div class="shell">
  <header>
    <div class="logo">SCRMJT<span> / proxy</span></div>
    <div class="status-pill">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">checking…</span>
    </div>
  </header>

  <div id="swBanner"></div>

  <div class="card">
    <div class="url-row">
      <div class="url-prefix">PROXY &gt;</div>
      <input id="urlInput" type="text" placeholder="https://example.com" autocomplete="off" spellcheck="false"/>
      <button class="go-btn" onclick="navigate()">GO</button>
    </div>
    <div class="toolbar">
      <button class="tb-btn" onclick="frameNav('back')">◀ BACK</button>
      <button class="tb-btn" onclick="frameNav('forward')">FORWARD ▶</button>
      <button class="tb-btn" onclick="frameNav('reload')">↺ RELOAD</button>
      <button class="tb-btn active" id="btnIframe" onclick="setMode('iframe')">IFRAME</button>
      <button class="tb-btn" id="btnNewTab" onclick="setMode('newtab')">NEW TAB</button>
      <div style="flex:1"></div>
      <button class="tb-btn" onclick="clearLog()">CLEAR LOG</button>
    </div>
    <div id="splash">
      <div class="splash-glyph">✦</div>
      <div class="splash-title">SCRAMJET PROXY</div>
      <div class="splash-sub">Enter a URL and hit GO. Requests are routed through the Scramjet service worker and bare relay.</div>
      <div class="quick-links">
        <button class="ql" onclick="setUrl('https://example.com')">example.com</button>
        <button class="ql" onclick="setUrl('https://en.wikipedia.org')">wikipedia</button>
        <button class="ql" onclick="setUrl('https://news.ycombinator.com')">hacker news</button>
        <button class="ql" onclick="setUrl('https://github.com')">github</button>
      </div>
    </div>
    <iframe id="proxyFrame" sandbox="allow-scripts allow-same-origin allow-forms allow-popups"></iframe>
  </div>

  <div class="log-section">
    <div class="log-header">
      <span>EVENT LOG</span><span id="logCount">0 entries</span>
    </div>
    <ul id="logList"></ul>
  </div>

  <footer>
    <span>SCRMJT v2.0 — <span id="deployHost"></span></span>
    <span id="bareUrl"></span>
  </footer>
</div>

<!-- Scramjet controller bundle served by the backend -->
<script src="/scram/scramjet.bundle.js"></script>
<script>
// ── Config ────────────────────────────────────────────────────
const BARE_URL  = "/bare/";
const SW_SCRIPT = "/scram/scramjet.sw.js";
const SW_SCOPE  = "/scramjet/";
const SCRAM_PREFIX = "/scramjet/";   // proxied URLs live under this prefix

// ── Logging ───────────────────────────────────────────────────
const logEl = document.getElementById("logList");
let logN = 0;
function log(msg, lvl="inf") {
  const li = document.createElement("li");
  const ts = new Date().toLocaleTimeString("en-US",{hour12:false});
  li.innerHTML = `<span class="ts">[${ts}]</span> <span class="lvl-${lvl}">[${lvl.toUpperCase()}]</span> ${msg}`;
  logEl.prepend(li);
  document.getElementById("logCount").textContent = `${++logN} entries`;
}
function clearLog(){logEl.innerHTML="";logN=0;document.getElementById("logCount").textContent="0 entries";}

// ── Banner ────────────────────────────────────────────────────
function showBanner(msg,type){
  const b=document.getElementById("swBanner");
  b.textContent=msg; b.className=type; b.style.display="block";
}

// ── Status check ──────────────────────────────────────────────
async function checkStatus() {
  const dot=document.getElementById("statusDot"), text=document.getElementById("statusText");
  try {
    const d=await (await fetch("/api/status")).json();
    dot.className="status-dot online"; text.textContent="online";
    document.getElementById("bareUrl").textContent="bare: "+d.barePrefix;
    document.getElementById("deployHost").textContent=location.hostname;
    log("Backend online","ok");
  } catch {
    dot.className="status-dot error"; text.textContent="offline";
    log("Cannot reach /api/status — is server running?","err");
  }
}

// ── Scramjet init ─────────────────────────────────────────────
let scramjet = null;

async function initScramjet() {
  try {
    scramjet = new ScramjetController({
      prefix: SCRAM_PREFIX,
      files: {
        wasm:   "/scram/scramjet.wasm.wasm",
        all:    "/scram/scramjet.all.js",
        sync:   "/scram/scramjet.sync.js",
      },
      codec: {
        encode: (url) => encodeURIComponent(url),
        decode: (url) => decodeURIComponent(url),
      },
    });
    await scramjet.init(SW_SCRIPT);
    showBanner("Scramjet service worker active ✓","ok");
    log("Scramjet SW registered at "+SW_SCOPE,"ok");
    return true;
  } catch(e) {
    showBanner("Scramjet init failed: "+e.message+" — must be served over HTTP(S), not file://","err");
    log("Scramjet error: "+e.message,"err");
    return false;
  }
}

// ── Mode ──────────────────────────────────────────────────────
let mode = "iframe";
function setMode(m) {
  mode = m;
  document.getElementById("btnIframe").classList.toggle("active", m==="iframe");
  document.getElementById("btnNewTab").classList.toggle("active",  m==="newtab");
  log("Mode → "+m,"inf");
}

function setUrl(u){ document.getElementById("urlInput").value=u; }

// ── Navigate ──────────────────────────────────────────────────
async function navigate() {
  let url = document.getElementById("urlInput").value.trim();
  if (!url) return;
  if (!/^https?:\/\//i.test(url)) url = "https://" + url;

  if (!scramjet) {
    log("Scramjet not ready — initialising…","err");
    const ok = await initScramjet();
    if (!ok) return;
  }

  const proxied = scramjet.encodeUrl(url);
  log("→ "+url,"ok");

  const frame  = document.getElementById("proxyFrame");
  const splash = document.getElementById("splash");

  if (mode === "newtab") { window.open(proxied,"_blank"); log("Opened in new tab","inf"); return; }

  splash.style.display = "none";
  frame.style.display  = "block";
  frame.src = proxied;
  frame.onload  = () => log("Frame loaded","ok");
  frame.onerror = () => log("Frame error","err");
}

// ── Frame controls ────────────────────────────────────────────
function frameNav(a) {
  const f = document.getElementById("proxyFrame");
  try {
    if      (a==="back")    f.contentWindow.history.back();
    else if (a==="forward") f.contentWindow.history.forward();
    else                    f.contentWindow.location.reload();
    log("Frame: "+a,"inf");
  } catch(e) { log("Frame nav blocked: "+e.message,"err"); }
}

document.getElementById("urlInput").addEventListener("keydown", e => { if(e.key==="Enter") navigate(); });

// ── Boot ──────────────────────────────────────────────────────
(async () => {
  await checkStatus();
  await initScramjet();
})();
</script>
</body>
</html>
