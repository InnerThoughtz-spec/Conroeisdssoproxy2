services:
  - type: web
    name: scramjet-proxy
    env: node
    plan: free                     # free tier — 750 hrs/month
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /api/status
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000               # Render's default port
